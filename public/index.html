<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback generator sau generator de dialog :) [v0.0.7]</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #2d1b4e 0%, #1a0f2e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .container {
            text-align: center;
            padding: 20px;
        }

        h1 {
            font-size: 3.5rem;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
            color: #ffd700;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 1.3rem;
            margin-bottom: 50px;
            color: #b0b0b0;
            font-style: italic;
        }

        .button-container {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            background: linear-gradient(145deg, #ffd700, #ffed4e);
            color: #1a0f2e;
            border: none;
            padding: 20px 50px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(255, 215, 0, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(255, 215, 0, 0.6);
            background: linear-gradient(145deg, #ffed4e, #ffd700);
        }

        button:active {
            transform: translateY(-1px);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }

            .subtitle {
                font-size: 1rem;
            }

            button {
                padding: 15px 40px;
                font-size: 1rem;
            }

            .button-container {
                gap: 15px;
            }
        }

        .footer {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: #888;
            font-size: 0.9rem;
        }

        .version {
            position: fixed;
            bottom: 10px;
            right: 10px;
            font-size: 0.7rem;
            color: #888;
            background: rgba(0,0,0,0.5);
            padding: 5px 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 Feedback generator sau generator de dialog :) 🎯</h1>
        <p class="subtitle">Pune intrebari si da variante de raspuns 🤣</p>
        
        <div class="button-container">
            <button onclick="window.location.href='game.html'">Joacă Joc</button>
            <button onclick="window.location.href='editor.html'">Adaugă Întrebare</button>
        </div>
    </div>

    <div class="footer">
        <p>&copy; Fii si tu mai vorbareata in anul asta © 2026</p>
    </div>

    <div class="version">v0.0.7</div>

    <script>
        console.log('%c[v0.0.7] Index page loaded', 'color: #ffd700; font-weight: bold');
    </script>
</body>
</html>
