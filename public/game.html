<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jocul - Feedback generator sau generator de dialog :) [v0.0.7]</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #2d1b4e 0%, #1a0f2e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 20px;
        }

        .container {
            background: rgba(45, 27, 78, 0.9);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
            max-width: 800px;
            width: 100%;
            border: 2px solid #ffd700;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.8);
            color: #ffd700;
            text-align: center;
        }

        .loading {
            text-align: center;
            font-size: 1.2rem;
            color: #ffd700;
        }

        .question-counter {
            text-align: center;
            color: #b0b0b0;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .question-text {
            background: rgba(255, 215, 0, 0.1);
            border-left: 4px solid #ffd700;
            padding: 20px;
            margin-bottom: 30px;
            border-radius: 8px;
            font-size: 1.3rem;
            font-weight: bold;
            color: #ffd700;
            line-height: 1.5;
        }

        .answers-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .answer-btn {
            padding: 20px;
            background: linear-gradient(145deg, rgba(255, 215, 0, 0.2), rgba(255, 215, 0, 0.1));
            border: 2px solid #ffd700;
            border-radius: 10px;
            color: #ffd700;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .answer-btn:hover:not(:disabled) {
            background: rgba(255, 215, 0, 0.3);
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 215, 0, 0.4);
        }

        .answer-btn:disabled {
            cursor: not-allowed;
        }

        .answer-btn.correct {
            background: linear-gradient(145deg, #4caf50, #45a049);
            border-color: #4caf50;
            color: white;
            animation: pulse 0.6s ease;
        }

        .answer-btn.wrong {
            background: linear-gradient(145deg, #f44336, #da190b);
            border-color: #f44336;
            color: white;
            animation: shake 0.5s ease;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
            100% {
                transform: scale(1);
            }
        }

        @keyframes shake {
            0%, 100% {
                transform: translateX(0);
            }
            25% {
                transform: translateX(-5px);
            }
            75% {
                transform: translateX(5px);
            }
        }

        .info {
            text-align: center;
            color: #b0b0b0;
            font-size: 0.9rem;
            margin-top: 20px;
        }

        .status {
            text-align: center;
            font-size: 1.1rem;
            font-weight: bold;
            margin-top: 20px;
            min-height: 30px;
        }

        .status.correct-answer {
            color: #4caf50;
        }

        .status.wrong-answer {
            color: #f44336;
        }

        .back-button {
            margin-top: 20px;
            padding: 10px 20px;
            background: rgba(255, 215, 0, 0.2);
            color: #ffd700;
            border: 2px solid #ffd700;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            width: 100%;
        }

        .back-button:hover {
            background: rgba(255, 215, 0, 0.3);
        }

        .next-button {
            margin-top: 15px;
            padding: 12px 20px;
            background: linear-gradient(145deg, #ffd700, #ffed4e);
            color: #1a0f2e;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: all 0.3s ease;
            width: 100%;
            display: none;
        }

        .next-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 215, 0, 0.4);
        }

        .next-button.show {
            display: block;
        }

        .version {
            position: fixed;
            bottom: 10px;
            right: 10px;
            font-size: 0.7rem;
            color: #888;
            background: rgba(0,0,0,0.5);
            padding: 5px 10px;
            border-radius: 5px;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 1.8rem;
            }

            .question-text {
                font-size: 1.1rem;
            }

            .answer-btn {
                padding: 15px;
                font-size: 1rem;
            }

            .answers-container {
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 Feedback generator sau generator de dialog :) 🎯</h1>
        
        <div class="question-counter">
            <span id="questionNumber">Întrebarea: --</span> | 
            <span id="lastUpdate">Actualizat acum: --</span>
        </div>

        <div id="gameContent">
            <div class="loading">⏳ Încărcarea întrebării...</div>
        </div>

        <div class="status" id="status"></div>

        <button class="next-button" id="nextButton" onclick="loadQuestion()">Următoarea Întrebare →</button>

        <button class="back-button" onclick="window.location.href='index.html'">← Înapoi la Meniu</button>

        <div class="info">
            🔄 Pagina se actualizează automat la fiecare 2 secunde
        </div>
    </div>

    <div class="version">v0.0.7</div>

    <script>
        const VERSION = '0.0.7';
        console.log(`%c[v${VERSION}] Game loaded`, 'color: #ffd700; font-weight: bold');

        let currentQuestion = null;
        let answered = false;
        let lastUpdateTime = null;
        let updateInterval = null;

        async function loadQuestion() {
            console.log(`[v${VERSION}] Loading question...`);
            try {
                const apiUrl = window.location.hostname === 'localhost' 
                    ? 'http://localhost:3000/api/questions' 
                    : '/api/questions';

                console.log(`[v${VERSION}] Fetching from:`, apiUrl);
                const response = await fetch(apiUrl);
                const result = await response.json();
                console.log(`[v${VERSION}] Response:`, result);

                if (!response.ok) {
                    console.error(`[v${VERSION}] Error:`, result);
                    document.getElementById('gameContent').innerHTML = 
                        '<div class="loading">❌ Eroare la încărcarea datelor</div>';
                    return;
                }

                if (!result.data) {
                    console.warn('No questions available');
                    document.getElementById('gameContent').innerHTML = 
                        '<div class="loading">📝 Nu sunt întrebări disponibile. Adaugă o întrebare!</div>';
                    return;
                }

                currentQuestion = result.data;
                answered = false;
                lastUpdateTime = new Date();

                renderQuestion();
                updateStatus();

            } catch (err) {
                console.error(`[v${VERSION}] Fetch error:`, err);
                document.getElementById('gameContent').innerHTML = 
                    '<div class="loading">❌ Eroare la încărcarea datelor</div>';
            }
        }

        function renderQuestion() {
            const gameContent = document.getElementById('gameContent');
            const questionHTML = `
                <div class="question-text">${currentQuestion.question}</div>
                <div class="answers-container">
                    <button class="answer-btn" onclick="checkAnswer('A')" data-answer="A">${currentQuestion.optionA}</button>
                    <button class="answer-btn" onclick="checkAnswer('B')" data-answer="B">${currentQuestion.optionB}</button>
                    <button class="answer-btn" onclick="checkAnswer('C')" data-answer="C">${currentQuestion.optionC}</button>
                    <button class="answer-btn" onclick="checkAnswer('D')" data-answer="D">${currentQuestion.optionD}</button>
                </div>
            `;
            gameContent.innerHTML = questionHTML;

            // Dezactivează butoanele dacă deja s-a răspuns
            if (answered) {
                const buttons = document.querySelectorAll('.answer-btn');
                buttons.forEach(btn => btn.disabled = true);
            }
        }

        function checkAnswer(selectedAnswer) {
            if (answered) return;

            answered = true;
            const buttons = document.querySelectorAll('.answer-btn');
            const statusDiv = document.getElementById('status');
            const nextButton = document.getElementById('nextButton');

            buttons.forEach(btn => {
                btn.disabled = true;
                const answer = btn.getAttribute('data-answer');

                if (answer === currentQuestion.correctAnswer) {
                    btn.classList.add('correct');
                }

                if (answer === selectedAnswer && answer !== currentQuestion.correctAnswer) {
                    btn.classList.add('wrong');
                }
            });

            if (selectedAnswer === currentQuestion.correctAnswer) {
                statusDiv.textContent = '✅ CORECT! Răspunsul tău este corect!';
                statusDiv.className = 'status correct-answer';
            } else {
                statusDiv.textContent = `❌ GREȘIT! Răspunsul corect este: ${currentQuestion.correctAnswer}`;
                statusDiv.className = 'status wrong-answer';
            }

            nextButton.classList.add('show');
        }

        function updateStatus() {
            if (lastUpdateTime) {
                const now = new Date();
                const secondsAgo = Math.floor((now - lastUpdateTime) / 1000);
                
                let timeText;
                if (secondsAgo < 60) {
                    timeText = `acum ${secondsAgo}s`;
                } else {
                    timeText = `acum ${Math.floor(secondsAgo / 60)}m`;
                }

                document.getElementById('lastUpdate').textContent = `Actualizat ${timeText}`;
                document.getElementById('questionNumber').textContent = 
                    `Întrebarea #${currentQuestion.id}`;
            }
        }

        function startAutoRefresh() {
            // Actualizează afișajul fiecă secundă
            setInterval(updateStatus, 1000);

            // Încarc întrebări noi la fiecare 2 secunde (dar fără a rescrie răspunsul dacă s-a răspuns)
            updateInterval = setInterval(async () => {
                if (!answered) {
                    await loadQuestion();
                }
            }, 2000);
        }

        // Start application
        loadQuestion();
        startAutoRefresh();

        console.log(`%c[v${VERSION}] Game fully loaded`, 'color: #4caf50; font-weight: bold');
    </script>
</body>
</html>
