<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adaugă Întrebare - Cine vrea să fie milionar [v0.0.3]</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #2d1b4e 0%, #1a0f2e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 20px;
        }

        .container {
            background: rgba(45, 27, 78, 0.9);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
            max-width: 600px;
            width: 100%;
            border: 2px solid #ffd700;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 30px;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.8);
            color: #ffd700;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #ffd700;
            font-size: 1rem;
        }

        input[type="text"],
        textarea,
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ffd700;
            border-radius: 8px;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        select {
            cursor: pointer;
            appearance: none;
            padding-right: 40px;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23ffd700' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 10px center;
            background-size: 20px;
            padding-right: 40px;
        }

        select option {
            background: #2d1b4e;
            color: white;
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(145deg, #ffd700, #ffed4e);
            color: #1a0f2e;
            border: none;
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(255, 215, 0, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(255, 215, 0, 0.6);
        }

        button:active {
            transform: translateY(-1px);
        }

        .message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            display: none;
            animation: slideIn 0.3s ease;
        }

        .message.success {
            background: rgba(76, 175, 80, 0.3);
            color: #4caf50;
            border: 2px solid #4caf50;
        }

        .message.error {
            background: rgba(244, 67, 54, 0.3);
            color: #f44336;
            border: 2px solid #f44336;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .back-button {
            margin-top: 20px;
            padding: 10px 20px;
            background: rgba(255, 215, 0, 0.2);
            color: #ffd700;
            border: 2px solid #ffd700;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            width: 100%;
        }

        .back-button:hover {
            background: rgba(255, 215, 0, 0.3);
        }

        .version {
            position: fixed;
            bottom: 10px;
            right: 10px;
            font-size: 0.7rem;
            color: #888;
            background: rgba(0,0,0,0.5);
            padding: 5px 10px;
            border-radius: 5px;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 1.8rem;
            }

            input[type="text"],
            textarea,
            select {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>➕ Adaugă Întrebare</h1>
        
        <form id="questionForm">
            <div class="form-group">
                <label for="question">Întrebare:</label>
                <textarea id="question" placeholder="Scrie întrebarea aici..." required></textarea>
            </div>

            <div class="form-group">
                <label for="answerA">Răspuns A:</label>
                <input type="text" id="answerA" placeholder="Răspuns varianta A..." required>
            </div>

            <div class="form-group">
                <label for="answerB">Răspuns B:</label>
                <input type="text" id="answerB" placeholder="Răspuns varianta B..." required>
            </div>

            <div class="form-group">
                <label for="answerC">Răspuns C:</label>
                <input type="text" id="answerC" placeholder="Răspuns varianta C..." required>
            </div>

            <div class="form-group">
                <label for="answerD">Răspuns D:</label>
                <input type="text" id="answerD" placeholder="Răspuns varianta D..." required>
            </div>

            <div class="form-group">
                <label for="correctAnswer">Răspuns Corect:</label>
                <select id="correctAnswer" required>
                    <option value="">-- Selectează răspunsul corect --</option>
                    <option value="A">A</option>
                    <option value="B">B</option>
                    <option value="C">C</option>
                    <option value="D">D</option>
                </select>
            </div>

            <button type="submit">Salvează Întrebare</button>
        </form>

        <div id="message" class="message"></div>

        <button class="back-button" onclick="window.location.href='index.html'">← Înapoi la Meniu</button>
    </div>

    <div class="version">v0.0.3</div>

    <script>
        const VERSION = '0.0.3';
        console.log(`%c[v${VERSION}] Editor loaded`, 'color: #ffd700; font-weight: bold');

        const form = document.getElementById('questionForm');
        const messageDiv = document.getElementById('message');

        form.addEventListener('submit', handleSubmit);

        async function handleSubmit(e) {
            e.preventDefault();
            console.log(`[v${VERSION}] Form submitted`);

            // Validare
            const question = document.getElementById('question').value.trim();
            const answerA = document.getElementById('answerA').value.trim();
            const answerB = document.getElementById('answerB').value.trim();
            const answerC = document.getElementById('answerC').value.trim();
            const answerD = document.getElementById('answerD').value.trim();
            const correctAnswer = document.getElementById('correctAnswer').value.trim();

            console.log(`[v${VERSION}] Form data:`, {
                question: question.substring(0, 30) + '...',
                A: answerA.substring(0, 20) + '...',
                B: answerB.substring(0, 20) + '...',
                C: answerC.substring(0, 20) + '...',
                D: answerD.substring(0, 20) + '...',
                correct: correctAnswer
            });

            if (!question || !answerA || !answerB || !answerC || !answerD || !correctAnswer) {
                console.error(`[v${VERSION}] Missing fields`);
                showMessage('Completează toate câmpurile!', 'error');
                return;
            }

            try {
                const apiUrl = window.location.hostname === 'localhost' 
                    ? 'http://localhost:3000/api/questions' 
                    : '/api/questions';

                console.log(`[v${VERSION}] Sending to API:`, apiUrl);

                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        question,
                        A: answerA,
                        B: answerB,
                        C: answerC,
                        D: answerD,
                        correct: correctAnswer
                    })
                });

                const result = await response.json();
                console.log(`[v${VERSION}] Response status:`, response.status);
                console.log(`[v${VERSION}] Response:`, result);

                if (!response.ok) {
                    console.error(`[v${VERSION}] Error:`, result);
                    showMessage(result.error || 'Ceva nu a mers!', 'error');
                    return;
                }

                showMessage('Întrebare salvată cu succes! ✓', 'success');
                form.reset();

                setTimeout(() => {
                    messageDiv.style.display = 'none';
                }, 3000);

            } catch (err) {
                console.error(`[v${VERSION}] Error:`, err);
                showMessage('Ceva nu a mers!', 'error');
            }
        }

        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
        }

        console.log(`%c[v${VERSION}] Editor fully loaded`, 'color: #green; font-weight: bold');
    </script>
</body>
</html>
