<!DOCTYPE html>
<html lang="ro">
  v1.0.1
<head>
  <meta charset="UTF-8">
  <title>Test Supabase Insert</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/supabase.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 30px; }
    input, textarea, select { display: block; margin: 10px 0; padding: 8px; width: 300px; }
    button { padding: 10px 20px; background-color: orange; border: none; color: white; cursor: pointer; }
    button:hover { background-color: darkorange; }
    .success { color: green; }
    .error { color: red; }
  </style>
</head>
<body>

<h1>Adaugă întrebări în Supabase</h1>

<form id="gameForm">
  <label>Întrebare:</label>
  <textarea id="question" required></textarea>

  <label>Varianta A:</label>
  <input type="text" id="A" required>

  <label>Varianta B:</label>
  <input type="text" id="B" required>

  <label>Varianta C:</label>
  <input type="text" id="C" required>

  <label>Varianta D:</label>
  <input type="text" id="D" required>

  <label>Răspuns corect (A/B/C/D):</label>
  <select id="correct" required>
    <option value="">Selectează</option>
    <option value="A">A</option>
    <option value="B">B</option>
    <option value="C">C</option>
    <option value="D">D</option>
  </select>

  <button type="submit">Trimite</button>
</form>

<p id="status"></p>

<script>
  // Corect inițializare Supabase JS v2
  const supabaseUrl = 'https://tqsvemcagstrdlqagesz.supabase.co';
  const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRxc3ZlbWNhZ3N0cmRscWFnZXN6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMzQwNzEsImV4cCI6MjA4ODkxMDA3MX0.o_cGQGxqx3GWfGASReM0PkiuFGRiLtf3uhlmAuxdd9Q';
  const supabase = supabase.createClient(supabaseUrl, supabaseKey);

  const form = document.getElementById('gameForm');
  const status = document.getElementById('status');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    // Preluare date
    const question = document.getElementById('question').value;
    const A = document.getElementById('A').value;
    const B = document.getElementById('B').value;
    const C = document.getElementById('C').value;
    const D = document.getElementById('D').value;
    const correct = document.getElementById('correct').value;

    status.textContent = 'Se trimite...';
    status.className = '';

    try {
      const { data, error } = await supabase
        .from('game')
        .insert({ question, A, B, C, D, correct });

      if (error) throw error;

      status.textContent = 'Întrebare adăugată cu succes!';
      status.className = 'success';
      form.reset(); // resetează doar după ce merge insert-ul
    } catch (err) {
      status.textContent = 'Eroare: ' + err.message;
      status.className = 'error';
      console.error(err);
    }
  });
</script>

</body>
</html>
