<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>

body{
background:#1a0033;
color:white;
font-family:Arial;
text-align:center;
padding-top:40px;
}

input{
padding:10px;
margin:5px;
width:300px;
border-radius:6px;
border:none;
}

select{
padding:10px;
margin:10px;
}

button{
background:orange;
border:none;
padding:12px 25px;
font-size:18px;
cursor:pointer;
border-radius:8px;
}

button:hover{
opacity:0.9;
}

#status{
margin-top:20px;
font-size:18px;
}

.success{
color:#00ff88;
}

.error{
color:#ff4444;
}

</style>

</head>

<body>

<h2>Adaugă întrebare</h2>

<input id="question" placeholder="Întrebare"><br>

<input id="A" placeholder="Răspuns A"><br>
<input id="B" placeholder="Răspuns B"><br>
<input id="C" placeholder="Răspuns C"><br>
<input id="D" placeholder="Răspuns D"><br>

<select id="correct">
<option value="">Răspuns corect</option>
<option value="A">A</option>
<option value="B">B</option>
<option value="C">C</option>
<option value="D">D</option>
</select>

<br>

<button onclick="trimite()">Trimite</button>

<div id="status"></div>

<script>

const supabase = window.supabase.createClient(
"https://tqsvemcagstrdlqagesz.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRxc3ZlbWNhZ3N0cmRscWFnZXN6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMzQwNzEsImV4cCI6MjA4ODkxMDA3MX0.o_cGQGxqx3GWfGASReM0PkiuFGRiLtf3uhlmAuxdd9Q"
)

async function trimite(){

let question=document.getElementById("question").value.trim()
let A=document.getElementById("A").value.trim()
let B=document.getElementById("B").value.trim()
let C=document.getElementById("C").value.trim()
let D=document.getElementById("D").value.trim()
let correct=document.getElementById("correct").value

let status=document.getElementById("status")

status.innerHTML="Se trimite..."

if(!question || !A || !B || !C || !D || !correct){

status.innerHTML='<span class="error">Completează toate câmpurile</span>'
return

}

try{

let {error}=await supabase
.from("question")
.insert([
{
question:question,
A:A,
B:B,
C:C,
D:D,
correct:correct
}
])

if(error){

status.innerHTML='<span class="error">ceva nu a mers</span>'
console.error(error)

}else{

status.innerHTML='<span class="success">Răspunsurile au fost salvate cu succes</span>'

document.getElementById("question").value=""
document.getElementById("A").value=""
document.getElementById("B").value=""
document.getElementById("C").value=""
document.getElementById("D").value=""
document.getElementById("correct").value=""

}

}catch(e){

status.innerHTML='<span class="error">ceva nu a mers</span>'
console.error(e)

}

}

</script>

</body>
</html>
