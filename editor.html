<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
background:#1a0033;
color:white;
font-family:Arial;
text-align:center;
padding-top:40px;
}

input{
padding:10px;
margin:5px;
width:320px;
}

select{

}

button{

border:none;

}

</style>

</head>

<body>

<h2>Adaugă întrebare</h2>

<input id="question" placeholder="Întrebare"><br>

<input id="A" placeholder="Răspuns A"><br>
<input id="B" placeholder="Răspuns B"><br>
<input id="C" placeholder="Răspuns C"><br>
<input id="D" placeholder="Răspuns D"><br>

<select id="correct">
<option value="">Alege răspunsul corect</option>
<option value="A">A</option>
<option value="B">B</option>
<option value="C">C</option>
<option value="D">D</option>
</select>

<br>

<button onclick="trimite()">Trimite</button>

<div id="status"></div>

<script>

const SUPABASE_URL = "https://tqsvemcagstrdlqagesz.supabase.co"
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRxc3ZlbWNhZ3N0cmRscWFnZXN6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMzQwNzEsImV4cCI6MjA4ODkxMDA3MX0.o_cGQGxqx3GWfGASReM0PkiuFGRiLtf3uhlmAuxdd9Q"

const supabase = window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY)

async function trimite(){

let status=document.getElementById("status")
status.innerText="Se trimite..."

let question=document.getElementById("question").value
let A=document.getElementById("A").value
let B=document.getElementById("B").value
let C=document.getElementById("C").value
let D=document.getElementById("D").value
let correct=document.getElementById("correct").value

if(!question || !A || !B || !C || !D || !correct){

status.innerText="Completează toate câmpurile"
return

}

try{

let {error}=await supabase
.from("question")
.insert([
{
question:question,
A:A,
B:B,
C:C,
D:D,
correct:correct
}
])

if(error){

console.log(error)
status.innerText="ceva nu a mers"

}else{

status.innerText="Răspunsurile au fost salvate"

}

}catch(e){

console.log(e)
status.innerText="ceva nu a mers"

}

}

</script>
